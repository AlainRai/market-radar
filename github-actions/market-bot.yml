## ============================================================
## MarketRadar — GitHub Actions Bot Scheduler
## ============================================================
## This file lives at: .github/workflows/market-bot.yml
## It runs your Python bots every 30 minutes, automatically,
## for free — no server needed.
##
## Setup:
##   1. In your GitHub repo, go to Settings > Secrets > Actions
##   2. Add each secret listed under "env:" below
##   3. Push this file to .github/workflows/market-bot.yml
##   4. GitHub starts running it on schedule automatically
## ============================================================

name: MarketRadar Bot

on:
  schedule:
    ## Runs every 30 minutes
    ## Note: GitHub Actions schedule uses UTC time
    ## Tadawul hours: 10:00-15:00 AST = 07:00-12:00 UTC
    ## We run 06:30-13:30 UTC to cover pre/post market too
    - cron: '0,30 6-13 * * 0-4'   # Every 30 min, Sun-Thu (Tadawul days)
    - cron: '0,30 7-16 * * 1-5'   # Every 30 min, Mon-Fri (Global markets)

  ## Also allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'Manual trigger'

jobs:
  run-bots:
    name: Run MarketRadar Bots
    runs-on: ubuntu-latest
    timeout-minutes: 15  # Kill if taking too long

    steps:
      ## Step 1: Get the code
      - name: Checkout repository
        uses: actions/checkout@v4

      ## Step 2: Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: bots/requirements.txt

      ## Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r bots/requirements.txt

      ## Step 4: Run the full bot cycle
      - name: Run MarketRadar bots
        env:
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL:            ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:            ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY:    ${{ secrets.SUPABASE_SERVICE_KEY }}
          ALPHA_VANTAGE_KEY:       ${{ secrets.ALPHA_VANTAGE_KEY }}
          NEWS_API_KEY:            ${{ secrets.NEWS_API_KEY }}
          ALERT_EMAIL_FROM:        ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_EMAIL_TO:          ${{ secrets.ALERT_EMAIL_TO }}
          GMAIL_APP_PASSWORD:      ${{ secrets.GMAIL_APP_PASSWORD }}
          HIGH_PROBABILITY_ALERT_THRESHOLD: "75"
        run: |
          cd bots
          python main_bot.py

      ## Step 5: Report status
      - name: Bot run complete
        if: always()
        run: |
          echo "Bot cycle completed at $(date -u)"
          echo "Status: ${{ job.status }}"
